version: "3.9"

services:
  manager:
    build:
      context: .
      dockerfile: manager/Dockerfile
    ports:
      - "8080:8080"
    environment:
      - CRACKHASH_WORKER_COUNT=2

  worker1:
    build:
      context: .
      dockerfile: worker/Dockerfile
    ports:
      - "8081:8080"
    depends_on:
      - manager

  worker2:
    build:
      context: .
      dockerfile: worker/Dockerfile
    ports:
      - "8082:8080"
    depends_on:
      - manager