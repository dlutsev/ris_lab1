version: "3.9"

services:
  manager:
    build:
      context: .
      dockerfile: manager/Dockerfile
    ports:
      - "8080:8080"
    networks:
      - crackhash-net

  worker1:
    build:
      context: .
      dockerfile: worker/Dockerfile
    image: crackhash-worker:latest
    ports:
      - "8081:8080"
    networks:
      - crackhash-net
    depends_on:
      - manager

  worker2:
    image: crackhash-worker:latest
    ports:
      - "8082:8080"
    networks:
      - crackhash-net
    depends_on:
      - manager

networks:
  crackhash-net:
    driver: bridge